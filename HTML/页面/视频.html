<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频学习</title>
</head>
<body>
    <h2>视频学习</h2>
    <video src="../media/xiaomi.mp4" controls autoplay muted poster="../img/xiaomi.jpg" width="300"></video>
    <h2>兼容性视频</h2>
    <video autoplay muted poster="../img/xiaomi.jpg" width="300" controls>
        <source src="../media/xiaomi.mp4" type="video/mp4">
        <p>您的浏览器不支持视频播放，请升级您的浏览器。</p>
    </video>
    <h2>图片学习</h2>
    <img src="../img/xiaomi.jpg" alt="小米Su7" width="300" title="xiaomiSu7">
    <h2>音频学习</h2>
    <audio src="../media/xiaomi.mp3" controls autoplay muted></audio>
    <h2>兼容性音频</h2>
    <audio autoplay muted controls>
        <source src="../media/xiaomi.mp3" type="audio/mpeg">
        <p>您的浏览器不支持音频播放，请升级您的浏览器。</p>
    </audio>
</body>
</html>
