<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位移，translate变化</title>
    <style>
        .box1{
            width: 100px;
            height: 100px;
            background-color: pink;
            transition: all 0.5s;
        }
        .box1:hover{
            transform: translate(100px, 100px);
        }
        .box2{
            width: 100px;
            height: 100px;
            background-color: skyblue;
            transform: translateX(50%);
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
