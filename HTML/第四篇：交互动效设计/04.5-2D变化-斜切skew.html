<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斜切skew</title>
    <style>
    .box {
      width: 200px;
      height: 55px;
      text-align: center;
      line-height: 55px;
      color: #fff;
      background-color: pink;
      /* 倾斜效果 */
      transform: skewX(-16deg);
    }

    .card {
        position: relative;
        width: 240px;
        height: 280px;
        margin:50px;

    }
    .card div {
        position: absolute;
        top: 0;
        left: 0;
        width: 240px;
        height: 280px;
        border-radius: 0px 30px 40px 40px;
        transform-origin: left top;
        transition: all 0.8s;
        /* 添加滤镜效果，这里只是演示，后期我会交给小伙们 */
        backdrop-filter: blur(30px);
    }
    .card .front {
        border-radius: 0 30px 40px 40px;
        background-color: rgba(255, 255, 255, 0.3);
        z-index: 1;
    }
    .card .back {    
        background-color: pink;
        transform: skewY(8deg);
    }
    .card:hover .back {
        transform: skewY(15deg);
        width: 200px;
    }
    .card:hover .front {
        transform: translateY(-2px);
    }
    </style>
</head>
<body>
    <div class="box">
        我是一个盒子
    </div>
    <div class="card">
        <div class="front"></div>
        <div class="back"></div>
    </div>

</body>
</html>
