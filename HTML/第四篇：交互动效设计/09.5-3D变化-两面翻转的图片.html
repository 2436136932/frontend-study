<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D变化-两面翻转的图片</title>
    <style>
    * {
      margin: 0;
      padding: 0;
    }

    .box {
      position: relative;
      width: 300px;
      height: 450px;
      margin: 100px auto;
      /* 添加透视效果 */
      perspective: 1000px;
    }
    .box img {
      width: 300px;
      height: 450px;
      border-radius: 10px;
    }
    .box div {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transition: all 1s;
      /* 转到后面要隐藏盒子 */
      backface-visibility: hidden;
    }
    .box .front {
      z-index: 1;
    }
    .box:hover .front {
      transform: rotateY(-180deg);
    }

    .box .back {
      transform: rotateY(180deg);
    }
    .box:hover .back {
      transform: rotateY(0deg);
    }
    
    </style>
</head>
<body>
    <div class="box">
        <div class="front"><img src="../现代网页布局/img/1.jpg" alt=""></div>
        <div class="back"> <img src="../现代网页布局/img/2.jpg" alt=""></div>
    </div>
</html>
