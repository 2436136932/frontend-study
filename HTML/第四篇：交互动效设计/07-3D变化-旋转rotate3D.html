<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D变化-旋转rotate3D</title>
    <style>
        img {
            width: 200px;
            transition: all .8s cubic-bezier(0.65, 0.05, 0.36, 1);
        }
        .ldhx:hover {
            transform: rotateX(180deg);
        }
        .ldhy:hover {
            transform: rotateY(180deg);
        }
        .ldhz:hover {
            transform: rotateZ(180deg);
        }
    </style>
</head>
<body>
    <div>
        <img src="./img/ldhx.png" alt="" class="ldhx"><br>
        <img src="./img/ldhy.jpg" alt="" class="ldhy"><br>
        <img src="./img/ldhz.webp" alt="" class="ldhz">
    </div>
</body>
</html>
