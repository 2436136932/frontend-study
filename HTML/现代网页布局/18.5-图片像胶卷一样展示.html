<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片像胶卷一样展示</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        ul{
            list-style: none;
        }
        .box{
            position: relative;
            width: 1000px;
            margin: 200px auto;
            overflow: hidden;
        }
        .box::before,
        .box::after {
            position: absolute;
            left: 0;
            width: 100%;
            height: 100px;
            border-radius: 50%;
            background-color: #fff;
        }
        .box::before {
            content: '';
            /* text-align: center; */
            line-height: 120px;
            top: -50px;
        }
        .box::after {
            content: '';
            bottom: -50px;
        }
        .box ul {
            display: flex;
            gap: 10px;
            /* 水平滚动条 */
            overflow-x: scroll;
            /* 隐藏滚动条 */
            scrollbar-width: none;
            /* 平滑滚动 */
            scroll-behavior: smooth;
        }
        .box ul li{
            flex: 0 0 250px;
        }
        .box ul li img{
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="box">
        <ul>
            <li><img src="./img/1.jpg" alt=""></li>
            <li><img src="./img/2.jpg" alt=""></li>
            <li><img src="./img/3.jpg" alt=""></li>
            <li><img src="./img/4.jpg" alt=""></li>
            <li><img src="./img/5.jpg" alt=""></li>
            <li><img src="./img/6.jpg" alt=""></li>
            <li><img src="./img/7.jpg" alt=""></li>
            <li><img src="./img/8.jpg" alt=""></li>
            <li><img src="./img/9.jpg" alt=""></li>
            <li><img src="./img/10.jpg" alt=""></li>
            <li><img src="./img/11.jpg" alt=""></li>
        </ul>
    </div>

    <script>
    // 获取可滚动的容器
    const scrollContainer = document.querySelector('.box ul');
    // 监听鼠标滚轮事件
    scrollContainer.addEventListener('wheel', (e) => {
      // 阻止默认的垂直滚动行为

      e.preventDefault();
      // 根据滚轮的垂直滚动量（deltaY）调整横向滚动量（scrollLeft）
      // 乘以系数（如 1.5）可调整滚动灵敏度
      scrollContainer.scrollLeft += e.deltaY * 1.5;
    });
  </script>
</body>
</html>
