<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网格布局-仿字体图标响应式布局效果</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 18px;
            margin: 30px auto;
            max-width: 1350px;
        }
        .box video{
            width: 100%;
            height: 100%;
            border-radius: 18px;
        }
    </style>
</head>
<body>
    <div class="box">
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
        <video src="./img/video.mp4" autoplay muted loop></video>
    </div>
</body>
</html>
