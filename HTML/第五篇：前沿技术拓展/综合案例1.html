<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合案例1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ul,
        ol {
            list-style: none;
        }
        a {
            text-decoration: none;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #577ad4, #ad3d88);
        }

        .box {
            width: 250px;
            height: 50px;
            background-color: #fff;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            line-height: 50px;  
        }
        .nav {
            cursor: pointer;
            color: #ff216d;
            padding-left: 20px;
        }
        ul li {
            width: 250px;
            height: 50px;
            padding-left: 20px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            transform: translateX(-250px);
            opacity: 0;
            transition: all 0.3s ease-in-out calc(var(--i) * 0.1s);             
        }
        .box:hover ul li {
            transform: translateX(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="nav">菜单</div>
        <ul>
            <li style="--i:0"><a href="#">首页</a></li>
            <li style="--i:1"><a href="#">关于我们</a></li>
            <li style="--i:2"><a href="#">联系我们</a></li>
            <li style="--i:3"><a href="#">服务项目</a></li>
            <li style="--i:4"><a href="#">客户案例</a></li>
            <li style="--i:5"><a href="#">加入我们</a></li>
        </ul>
    </div>
    
</body>
</html>
