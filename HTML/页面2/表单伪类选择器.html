<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单伪类选择器</title>
    <style>
        button {
            width: 200px;
            height: 60px;
            background-color: #ff6900;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
        }
        button:disabled {
            /* opacity属性让整个按钮透明 */
            opacity: 0.5;
        }
        label {
            font-size: 25px;
        }
        /* 表单被选中伪类选择器 */
        input:checked + label {
            color: #ff6900;
        }
    </style>
</head>
<body>
    <form action="">
        <button disabled>注册</button><br>
        <input type="checkbox" id="agree">
        <label for="agree">同意协议</label>
    </form>
</body>
</html>
