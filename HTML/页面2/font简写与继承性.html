<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font简写与继承性</title>
    <style>
        body {
            font: italic 700 20px/1.5 Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div>
        <p>
            字体样式可以通过font属性来设置，font属性是一个简写属性，用于同时设置字体、字体大小、字体粗细、字体样式等。
        </p>
    </div>
</body>
</html>
