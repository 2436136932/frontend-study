<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子初始化自己做</title>
     <style>
    /* css初始化 简单重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 清除列表默认样式 */
    ul,
    ol {
      list-style: none;
    }

    /* 清除a标签默认下划线 */
    a {
      text-decoration: none;
    }
    body {
      background-color: #ccc;
    }

    /* 清除input默认轮廓线 */
    input,
    button {
      outline: none;
    }
    
    .box {
      width: 234px;
      height: 300px;
      background-color: #fff;
      margin: 100px auto;
      text-align: center;
      transition: all .4s;
    }
    .box:hover {
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    }
    img {
      width: 160px;
      height: 160px;
      margin-top: 20px;
    }
    h3 {
      font-size: 14px;
      font-weight: 400;
      color: #333;
      margin-top: 18px;
    }
    .title {
      font-size: 12px;
      color: #b0b0b0;
      /* 单行文本溢出省略 */
      /* 溢出隐藏 */
      overflow: hidden;
      /* 文本溢出显示省略号 */
      text-overflow: ellipsis;
      /* 强制文字一行显示， 不换行 */
      white-space: nowrap;
      padding: 0 10px;
    }
    .price {
      font-size: 14px;
      color: #b0b0b0;
      margin-top: 10px;
    }
    span {
      font-size: 14px;
      color: #ff6700;
    }
    del {
      font-size: 12px;
      color: #b0b0b0;
    }
    
  </style>
</head>
<body>
  <div class="main">
    <div class="box">
      <img src="../img/mi.webp" alt="">
      <h3>Xiaomi Buds 5</h3>
      <p class="title">舒适无感佩戴｜高通全链路无损音频｜哈曼 AudioEFX 联合调音</p>
      <p class="price">
      <span>659元</span>
      <del>699元</del>
      </p>
    <div class="box">
      <img src="../img/mi.webp" alt="">
      <h3>Xiaomi Buds 5</h3>
      <p class="title">舒适无感佩戴｜高通全链路无损音频｜哈曼 AudioEFX 联合调音</p>
      <p class="price">
      <span>659元</span>
      <del>699元</del>
      </p>
    </div>
    <div class="box">
    <img src="../img/mi.webp" alt="">
      <h3>Xiaomi Buds 5</h3>
      <p class="title">舒适无感佩戴｜高通全链路无损音频｜哈曼 AudioEFX 联合调音</p>
      <p class="price">
      <span>659元</span>
      <del>699元</del>
      </p>
    </div>
  </div>
</body>
</html>
