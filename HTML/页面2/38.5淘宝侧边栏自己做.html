    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        a {
            color: #1f1f1f;
            text-decoration: none;
        }
        ul,
        ol {
            list-style: none;
        }
        .service {
            width: 256px;
            height: 400px;
            background-color: #f7f7f7;
            border-radius: 12px;
            margin : 100px auto;
        }
        .service-title {
            padding: 8px 0 0 16px;
            font-size: 16px;
            font-weight: 600;
            line-height: 32px;
            color: #1f1f1f;
        }
        .service-title img {
            width: 60px;
            height: 20px;
            margin-left: 4px;
        }
        
        .service-bd li {
            line-height: 32px;
            margin: 0 8px;
            padding-left: 10px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        /* 第一个li改颜色 */
        .service-bd li:nth-child(1),
        .service-bd li:nth-child(1) a {
            color: #ff5000;
        }
        
        .service-bd li i {
            margin-right: 4px;
        }
        .service-bd li a {
            font-size: 14px;
        }
        .service-bd li:hover {
            background-color: white;
        }
        .service-bd li a:hover {
            color: #ff5000;
            text-decoration: underline;
        }
    </style>
</head>
