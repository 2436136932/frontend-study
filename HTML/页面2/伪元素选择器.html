<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪元素选择器</title>
    <style>
        .main {
            width: 300px;
            margin: 0 auto;
        }
        input::placeholder {
            color: #ff6900;
        }
        .content p::first-letter {
            font-size: 50px;
            color: #ff6900;
        }
        .box {
            width: 300px;
            height: 300px;
            background-color: rgba(255, 105, 0, 0.2);
            border-radius: 10px;
            text-align: center;
            font-size: 40px;
            line-height: 300px;
        }
        .box:hover {
            background-color: rgba(161, 200, 234, 0.5);
        }
        .box p:hover {
            color: rgba(255, 153, 0, 1);
        }
    
        /* before和after伪元素 */
        .box p::before {
            content: "我是";
            color: red;
        }
        .box p::after {
            content: "佩奇";
            color: red;
        }
        .box p:hover::before {
            content: "我是";
            color: pink;
        }
        .box p:hover::after {
            content: "佩奇";
            color: rgb(241, 47, 255);
        }
    </style>
</head>
<body>
    <div class="main">
        <form action="" class="content">
            <p>请输入以下内容：</p>
            <input type="text" placeholder="请输入用户名" class="username"><br>
            <textarea name="" id="" class="textarea" placeholder="请输入评论内容"></textarea>
        </form>
        <div class="box">
            <p>小猪</p>
        </div>
    </div>
</body>
</html>
