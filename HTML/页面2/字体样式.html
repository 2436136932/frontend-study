<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>字体样式</title>
    <style>
        .pink{
            color: pink;
        }
        .rgb{
            color: rgb(0, 255, 255);
        }
        .rgba{
            color: rgba(0, 255, 255, 0.5);
        }
        .font{
            font-family: '宋体';
        }
        .font12{
            font-size: 12px;
        }
        .font16{
            font-size: 16px;
        }
        .font24{
            font-size: 24px;
        }
        .italic{
            font-style: italic;
        }
        .normal{
            font-style: normal;
        }
        .bold{
            font-weight: 700;
        }
        .nobold{
            font-weight: 400;
        }
        .underline{
            text-decoration: underline;
        }
        .line-through{
            text-decoration: line-through;
        }
        .overline{
            text-decoration: overline;
        }
        .none{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- 1.字体颜色 -->
<h2>字体颜色</h2>
<p class="pink" >字体颜色</p>
<p class="rgb">字体颜色</p>
<p class="rgba">字体颜色</p>    
    <!-- 2.字体族 -->
<h2>字体族</h2>
<p class="font">字体族</p>
    <!-- 3.字体大小 -->
<h2>字体大小</h2>
<p class="font12">字体大小</p>
<p class="font16">字体大小</p>
<p class="font24">字体大小</p>
    <!-- 4.字体风格 -->
<h2>字体风格</h2>
<p class="italic">字体样式倾斜可以用font-style:italic;</p>
<em class="normal">字体样式取消倾斜可以用font-style:normal;</em>
    <!-- 5.字体粗细 -->
<h2 class="nobold">字体粗细</h2>
<p class="bold">字体样式加粗可以用font-weight:bold;</p>
    <!-- 6.字体装饰 -->
<h2>字体装饰</h2>
<p class="underline">字体装饰下划线可以用text-decoration:underline;</p>
<p class="line-through">字体装饰删除线可以用text-decoration:line-through;</p>
<p class="overline">字体装饰上划线可以用text-decoration:overline;</p>
<a href="#" class="none">链接可以用none取消下划线</a>
</body>
</html>
