<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子过渡和阴影</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: linear-gradient(45deg, pink, rgb(255, 62, 146));
            transition: all 0.5s;
        }
        .box:hover {
            width: 220px;
            height: 220px;
            box-shadow: 0 0 15px 5px rgba(0, 0, 0, .5);
        }
    </style>
</head>
<body>
    <div class="box">
    </div>
</body>
</html>
