<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户行为伪类</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .box {
            width: 300px;
            line-height: 300px;
            text-align: center;
            font-size: 30px;
            /* 居中
            margin: 0 auto; */
        }
        .box1 {
            background-color: pink;
            border-radius: 10px;
        }
        .box1:hover {
            background-color: skyblue;
            color: #ffffff;
            border-radius: 50%;
        }
        .box2 {
            background-color: rgb(246, 255, 192);
            border-radius: 10px;
        }
        .box2:hover {
            background-color: rgb(135, 235, 210);
            color: #ffffff;
            border-radius: 50%;
        }
        .content {
            width: 200px;
            height: 30px;
            background-color: rgb(255, 192, 192);
            transition: all 1s;
        }
        .content:hover { 
            background-color: rgb(135, 235, 210);
        }
        .content:focus {
            background-color: rgb(255, 255, 192);
            width: 400px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1" id="box1">
            <p>文字1</p>
        </div>

        <div class="box2" id="box2">
            <p>文字2</p>
        </div>
    </div>
        <input type="text" placeholder="请输入内容" class="content">
</body>
</html>
